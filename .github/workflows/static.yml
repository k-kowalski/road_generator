name: Deploy Web Demo

  on:
    push:
      branches:
        - master
    workflow_dispatch:

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: github-pages
    cancel-in-progress: true

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Check out repository
          uses: actions/checkout@v4

        - name: Configure GitHub Pages
          uses: actions/configure-pages@v5

        - name: Install Emscripten SDK
          shell: bash
          run: |
            git clone https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
            "$RUNNER_TEMP/emsdk/emsdk" install latest
            "$RUNNER_TEMP/emsdk/emsdk" activate latest

        - name: Build web demo
          shell: bash
          run: |
            source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
            emcmake cmake -S . -B build/web-pages -G Ninja -DROADGEN_BUILD_NATIVE_DX12=OFF
            cmake --build build/web-pages --parallel

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: web/dist

    deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
